    <!-- Google tag (gtag.js) - deferred for better TTI -->
    <script>
      // Defer GTM loading until after page is interactive
      function loadGTM() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-BBC4N0F9W9';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-BBC4N0F9W9');
        gtag('config', 'AW-17947547907');
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGTM, { timeout: 3000 });
      } else {
        setTimeout(loadGTM, 2000);
      }
    </script>

    <!-- Preconnect to external origins for faster loading -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    
    <!-- Preload LCP image for better performance -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=50&w=1280" fetchpriority="high" type="image/jpeg" />
    
  </head>

  <body>
    <div id="root">
      <!-- Inline LCP placeholder: shown instantly, replaced when React mounts -->
      <div style="position:relative;height:450px;overflow:hidden;background:#111">

             alt="Skyskrapor som symboliserar affärsvärlden och Microsoft Dynamics 365"
             style="width:100%;height:100%;object-fit:cover"
             width="1600" height="1067"
             fetchpriority="high" decoding="sync" />
        <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.7),rgba(0,0,0,.5),rgba(0,0,0,.3))"></div>
      </div>
    </div>
