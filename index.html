    <!-- Inline critical CSS for instant hero paint from SSG HTML -->

      body{margin:0;font-family:ui-sans-serif,system-ui,sans-serif}
      .min-h-screen{min-height:100vh}
      .bg-secondary\/30{background-color:hsl(0 0% 96%/.3)}

    </style>
    
    <!-- Google tag (gtag.js) - deferred for better TTI -->
    <script>
      // Defer GTM loading until after page is interactive
      function loadGTM() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-BBC4N0F9W9';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-BBC4N0F9W9');
        gtag('config', 'AW-17947547907');
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGTM, { timeout: 5000 });
      } else {
        setTimeout(loadGTM, 4000);
      }
    </script>
