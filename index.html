    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:hsl(0 0% 15%);background:hsl(0 0% 100%);-webkit-font-smoothing:antialiased}

      /* Hero section */
      section{display:block}
      .container{max-width:80rem;margin:0 auto;padding-left:1rem;padding-right:1rem}
      h1{margin:0;font-weight:600;color:hsla(0,0%,100%,.9)}
      .text-white{color:#fff}
      .text-white\/70{color:hsla(0,0%,100%,.7)}
      /* Grid basics for hero */
      @media(min-width:768px){.md\:grid-cols-\[1fr_340px\]{display:grid;grid-template-columns:1fr 340px;gap:3.5rem}}
